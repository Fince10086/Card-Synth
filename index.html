<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Synth</title>
    <link rel="stylesheet" href="./fonts/fonts.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="workspace-main">
          <div class="signal-flow-shell">
            <section class="signal-flow">
              <div class="add-module-card" id="addModuleCard" tabindex="0" role="button" aria-label="Add module">
                <div class="add-module-icon">+</div>
                <div class="add-module-dropdown" id="addModuleDropdown"></div>
              </div>
            </section>
          </div>
        </main>

      </div>

    <input id="presetFileInput" type="file" accept=".json,application/json" hidden />

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
