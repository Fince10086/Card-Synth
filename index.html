<!DOCTYPE html>
<html lang="en">
  <head>
    <!--
      页面基础元信息。
      这里仅负责加载字体、样式表和脚本资源，所有 UI 结构与交互逻辑都分别在 body / app.js 中完成。
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tone.js Modular Synth Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="workspace-main">
          <div class="signal-flow-shell">
            <section class="signal-flow">
              <svg id="patchCables" class="patch-cables" aria-hidden="true"></svg>

              <div class="stage stage-sources" data-stage="sources">
                <div class="stage-header">
                  <div>
                    <p class="stage-kicker">Stage 01</p>
                    <h2>Sources</h2>
                  </div>
                </div>
                <div class="module-list" id="sourceRack"></div>
              </div>

              <div class="stage stage-filter" data-stage="filter">
                <div class="stage-header">
                  <div>
                    <p class="stage-kicker">Stage 02</p>
                    <h2>Filter</h2>
                  </div>
                </div>
                <div id="filterRack"></div>
              </div>

              <div class="stage stage-envelope" data-stage="envelope">
                <div class="stage-header">
                  <div>
                    <p class="stage-kicker">Stage 03</p>
                    <h2>Envelope</h2>
                  </div>
                </div>
                <div id="envelopeRack"></div>
              </div>

              <div class="stage stage-lfo" data-stage="lfo">
                <div class="stage-header">
                  <div>
                    <p class="stage-kicker">Stage 04</p>
                    <h2>LFO</h2>
                  </div>
                </div>
                <div id="lfoRack"></div>
              </div>

              <div class="stage stage-components" data-stage="components">
                <div class="stage-header">
                  <div>
                    <p class="stage-kicker">Stage 05</p>
                    <h2>Components</h2>
                  </div>
                </div>
                <div class="module-list" id="componentRack"></div>
              </div>

              <div class="stage stage-effects" data-stage="effects">
                <div class="stage-header">
                  <div>
                    <p class="stage-kicker">Stage 06</p>
                    <h2>Effects</h2>
                  </div>
                </div>
                <div class="module-list" id="effectRack"></div>
              </div>

              <div class="add-module-card" id="addModuleCard">
                <div class="add-module-icon">+</div>
                <div class="add-module-label">添加模块</div>
                <div class="add-module-dropdown" id="addModuleDropdown"></div>
              </div>
            </section>
          </div>
        </main>
      </div>

      <footer class="bottom-bar">
        <div class="bottom-bar-inner">
          <div class="bottom-bar-left">
            <div class="global-block" id="presetControls"></div>
            <div class="global-block volume-block" id="masterControls"></div>
          </div>
          <div class="bottom-bar-right">
            <div class="bottom-bar-scope">
              <canvas id="oscilloscope"></canvas>
              <div class="scope-controls">
                <button class="scope-btn" id="scopeZoomOutH" title="横向缩小">◀</button>
                <span class="scope-label" id="scopeHLabel">1x</span>
                <button class="scope-btn" id="scopeZoomInH" title="横向放大">▶</button>
                <button class="scope-btn" id="scopeZoomOutV" title="纵向缩小">▼</button>
                <span class="scope-label" id="scopeVLabel">1x</span>
                <button class="scope-btn" id="scopeZoomInV" title="纵向放大">▲</button>
              </div>
            </div>
            <div class="bottom-bar-keyboard">
              <div class="keyboard-hint">
                <span>A-K 演奏</span>
                <span>Z/X 八度</span>
                <span>C/V 力度</span>
              </div>
              <div id="virtualKeyboard" class="virtual-keyboard"></div>
            </div>
          </div>
        </div>
      </footer>
    </div>

    <input id="presetFileInput" type="file" accept=".json,application/json" hidden />

    <script src="https://cdn.jsdelivr.net/npm/tone@15.1.22/build/Tone.js"></script>
    <script src="./constants.js"></script>
    <script src="./helpers.js"></script>
    <script src="./audio-engine.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
